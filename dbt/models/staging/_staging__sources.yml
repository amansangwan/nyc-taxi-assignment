version: 2

sources:
  - name: nyc_tlc
    description: >
      Raw NYC TLC trip records, loaded into Snowflake ahead of dbt.
      dbt never writes here — staging models read 1:1 from these tables.
    database: NYC_TAXI
    schema: RAW
    tables:
      - name: yellow_tripdata
        identifier: YELLOW_TRIPDATA
        description: >
          Yellow Taxi trip records for the full 2023 year (~38M rows),
          one row per trip as delivered by TLC (includes exact-duplicate rows
          that staging later dedups on the surrogate key).
        config:
          loaded_at_field: tpep_pickup_datetime
          freshness:
            warn_after: { count: 24, period: hour }
            error_after: { count: 48, period: hour }
